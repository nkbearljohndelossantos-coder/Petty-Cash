<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NKB Petty Cash</title>
    <script>
      (function () {
        var reloadKey = 'nkb-petty-cash-stale-build-reloaded';
        var isAsset = function (url) { return typeof url === 'string' && url.indexOf('/assets/') !== -1; };
        var reloadFreshBuild = function () {
          if (sessionStorage.getItem(reloadKey) === '1') return;
          sessionStorage.setItem(reloadKey, '1');
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) { return caches.delete(key); }));
            }).finally(function () {
              location.replace(location.pathname + '?build=' + Date.now() + location.hash);
            });
            return;
          }
          location.replace(location.pathname + '?build=' + Date.now() + location.hash);
        };
        window.addEventListener('load', function () { sessionStorage.removeItem(reloadKey); });
        window.addEventListener('error', function (event) {
          var target = event.target;
          var url = target && (target.src || target.href);
          if (target !== window && isAsset(url)) reloadFreshBuild();
        }, true);
        window.addEventListener('unhandledrejection', function (event) {
          var message = String(event.reason && (event.reason.message || event.reason) || '');
          if (message.indexOf('Failed to fetch dynamically imported module') !== -1 || isAsset(message)) {
            reloadFreshBuild();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

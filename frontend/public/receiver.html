<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receiver with Persistent Toast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
</head>
<body>
    <h1>Real-Time Notifications</h1>

    <script>
        const socket = io();

        socket.on('receiveNotification', (data) => {
            // Toastr options for displaying persistent notifications
            toastr.options = {
                closeButton: true,
                progressBar: false,
                positionClass: 'toast-top-right',
                timeOut: '0',
                extendedTimeOut: '0',
                showEasing: 'swing',
                hideEasing: 'linear',
                showMethod: 'fadeIn',
                hideMethod: 'fadeOut'
            };

            const message = `Post Created By: ${data.postCreatedBy}<br>Post Title: ${data.postTitle}`;
            toastr.info(message, 'New Post Notification');
        });
    </script>
</body>
</html>
